<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBQA Global one</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: white;
      font-family: 'Poppins', sans-serif;
    }

    .mobile-layout {
      display: none;
    }


    /* === DESKTOP === */

    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .bg-main {
      position: absolute;
      inset: 0;
      background: url('assets/Background_C.png') no-repeat center;
      background-size: contain;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .bg-lines {
      position: absolute;
      top: 0;
      right: 0;
      width: clamp(160px, 14vw, 270px);
      pointer-events: none;
      z-index: 0;
    }

    .hero > *:not(.bg-main):not(.bg-lines) {
      position: relative;
      z-index: 1;
    }

    .top-logos {
      display: flex;
      align-items: center;
      gap: clamp(12px, 1vw, 20px);
      padding: clamp(24px, 4vh, 55px) 0 0 clamp(80px, 8vw, 150px);
    }

    .logo-cbqa {
      height: clamp(55px, 7.5vh, 95px);
      object-fit: contain;
    }

    .logo-nexora {
      height: clamp(44px, 6vh, 75px);
      object-fit: contain;
      position: relative;
      top: clamp(6px, 1vh, 15px);
    }

    .hero-body {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 clamp(10px, 1vw, 20px) 0 clamp(80px, 8vw, 150px);
      gap: clamp(10px, 1vw, 20px);
      justify-content: flex-end;
    }

    .hero-left {
      position: absolute;
      left: 50%;
      transform: translateX(calc(-50% - 8vw));
    }

    .brand-text {
      font-size: clamp(20px, 2.3vw, 44px);
      font-weight: 500;
      color: #111;
      line-height: 1;
      white-space: nowrap;
    }

    .one-text {
      font-size: clamp(80px, 15vw, 220px);
      font-weight: 900;
      color: #319EA9;
      line-height: 0.9;
      white-space: nowrap;
    }

    .desc-text {
      align-self: flex-start;
      text-align: left;
      margin-left: clamp(120px, 12vw, 220px);
    }

    .hero-right {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: clamp(20px, 2vw, 40px);
    }

    .menu-panel {
      width: clamp(240px, 20vw, 380px);
      padding: clamp(6px, 0.8vh, 12px) clamp(14px, 1.2vw, 26px);
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(2px);
    }

    .menu-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: clamp(12px, 1vw, 20px);
      padding: clamp(8px, 1vh, 14px) 8px;
      border-bottom: 1px solid #ccc;
      border-radius: 8px;
      transition: transform 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }

    .menu-link:last-child .menu-item {
      border-bottom: none;
    }

    .menu-item:hover {
      transform: translateX(8px) scale(1.02);
      background: rgba(49, 158, 169, 0.08);
    }

    .menu-item:hover img {
      transform: scale(1.1);
    }

    .menu-item:hover .menu-item-label span,
    .menu-item:hover .menu-item-label strong {
      color: #319EA9;
    }

    .menu-item img {
      width: clamp(48px, 4vw, 85px);
      height: clamp(48px, 4vw, 85px);
      transition: transform 0.2s ease;
    }

    .icon-placeholder-gcr {
      width: clamp(48px, 4vw, 85px);
      height: clamp(48px, 4vw, 85px);
    }

    .menu-item img,
    .icon-placeholder-gcr {
      display: block;
    }

    .menu-item-label {
      font-size: clamp(14px, 1.1vw, 20px);
      color: #111;
      line-height: 1.2;
      margin-top: 6px;
    }

    .menu-item-label span {
      font-weight: 300;
    }

    .menu-item-label strong {
      font-weight: 700;
    }

    .hero-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(40px, 5vw, 100px) clamp(20px, 4vh, 60px);
    }

    .service-desk {
      display: flex;
      align-items: center;
      gap: clamp(4px, 0.4vw, 10px);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .service-desk:hover {
      transform: scale(1.05);
    }

    .service-desk img {
      width: clamp(36px, 3.2vw, 60px);
      height: clamp(36px, 3.2vw, 60px);
      object-fit: contain;
    }

    .service-text {
      font-size: clamp(13px, 1vw, 20px);
      font-weight: 400;
    }

    .footer-text {
      font-size: clamp(14px, 1.4vw, 28px);
      color: #747474;
    }


    /* === MOBILE === */

    @media (max-width: 768px) {
      body {
        overflow: auto;
      }

      .hero {
        display: none;
      }

      .mobile-layout {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        position: relative;
        background: white;
        overflow: hidden;
      }

      .m-bg-main {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('assets/Background_C.png') no-repeat center;
        background-size: cover;
        opacity: 0.22;
        pointer-events: none;
        z-index: 0;
      }

      .m-bg-lines {
        position: absolute;
        top: 0;
        right: 0;
        width: 140px;
        pointer-events: none;
        z-index: 0;
      }

      .m-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        flex: 1;
        padding: 0 0 32px 0;
      }

      .m-logos {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 28px 24px 0;
      }

      .m-logo-cbqa {
        height: 52px;
        object-fit: contain;
      }

      .m-logo-nexora {
        height: 38px;
        object-fit: contain;
        position: relative;
        top: 6px;
      }

      .m-hero-text {
        padding: 24px 24px 0;
        position: relative;
      }

      .m-brand-text {
        font-size: 18px;
        font-weight: 500;
        color: #111;
        margin: 0 0 -8px 0;
      }

      .m-one-text {
        font-size: 108px;
        font-weight: 900;
        color: #319EA9;
        line-height: 0.95;
        margin: 0;
      }

      .m-desc-text {
        font-size: 13px;
        font-weight: 300;
        color: #777;
        line-height: 1.5;
        text-align: right;
        position: absolute;
        right: 24px;
        bottom: -48px;
      }

      .m-menu-panel {
        margin: 60px 20px 0;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(4px);
        border-radius: 12px;
        padding: 4px 16px;
      }

      .m-menu-link {
        text-decoration: none;
        color: inherit;
        display: block;
      }

      .m-menu-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 13px 6px;
        border-bottom: 1px solid #ddd;
        border-radius: 8px;
        transition: transform 0.2s ease, background 0.2s ease;
        cursor: pointer;
      }

      .m-menu-link:last-child .m-menu-item {
        border-bottom: none;
      }

      .m-menu-item:hover {
        transform: translateX(6px);
        background: rgba(49, 158, 169, 0.07);
      }

      .m-menu-item:hover .m-menu-label span,
      .m-menu-item:hover .m-menu-label strong {
        color: #319EA9;
      }

      .m-menu-item img {
        width: 44px;
        height: 44px;
        object-fit: contain;
        flex-shrink: 0;
      }

      .m-icon-gcr {
        width: 44px;
        height: 44px;
        flex-shrink: 0;
      }

      .m-menu-label {
        font-size: 16px;
        color: #111;
        line-height: 1.2;
      }

      .m-menu-label span {
        font-weight: 300;
      }

      .m-menu-label strong {
        font-weight: 700;
      }

      .m-service-desk {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
        margin-top: 28px;
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .m-service-desk:hover {
        transform: scale(1.04);
      }

      .m-service-desk img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .m-service-text {
        font-size: 15px;
        font-weight: 400;
        color: #555;
      }

      .m-footer-text {
        font-size: 13px;
        color: #aaa;
        text-align: center;
        margin-top: 10px;
      }
    }
  </style>
</head>

</html>
