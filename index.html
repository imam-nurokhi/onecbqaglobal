<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBQA Global one</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    .mobile-layout { display: none; }

    /* ═══════════════════════════════ DESKTOP ═══════════════════════════════ */

    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    /* Background circle image — center-left, prominent */
    .bg-main {
      position: absolute;
      inset: 0;
      background: url('assets/Background_C.png') no-repeat 28% center;
      background-size: 58vw;
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }

    /* Geometric line art — top right */
    .bg-lines {
      position: absolute;
      top: 0;
      right: 0;
      width: clamp(180px, 16vw, 300px);
      pointer-events: none;
      z-index: 0;
    }

    .hero > *:not(.bg-main):not(.bg-lines) {
      position: relative;
      z-index: 1;
    }

    /* ── TOP LOGOS ── */
    .top-logos {
      display: flex;
      align-items: center;
      gap: clamp(10px, 1vw, 18px);
      padding: clamp(20px, 3.5vh, 50px) 0 0 clamp(50px, 4.5vw, 80px);
    }

    .logo-cbqa {
      height: clamp(56px, 8vh, 100px);
      object-fit: contain;
    }

    .logo-nexora {
      height: clamp(40px, 5.5vh, 70px);
      object-fit: contain;
      position: relative;
      top: clamp(4px, 0.8vh, 12px);
    }

    /* ── HERO BODY ── */
    .hero-body {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
    }

    /* Left: CBQA Global + ONE + desc */
    .hero-left {
      position: absolute;
      left: clamp(160px, 22vw, 320px);
      top: 50%;
      transform: translateY(-50%);
    }

    .brand-text {
      font-size: clamp(20px, 2.4vw, 44px);
      font-weight: 600;
      color: #111;
      line-height: 1;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }

    .one-text {
      font-size: clamp(80px, 15vw, 218px);
      font-weight: 900;
      color: #319EA9;
      line-height: 0.85;
      white-space: nowrap;
      letter-spacing: -0.04em;
    }

    .desc-text {
      margin-top: clamp(8px, 1.2vh, 20px);
      margin-left: clamp(80px, 8vw, 150px);
      font-size: clamp(11px, 0.9vw, 16px);
      font-weight: 300;
      color: #555;
      line-height: 1.55;
    }

    /* Right: Service menu */
    .hero-right {
      position: absolute;
      right: clamp(100px, 20vw, 300px);
      top: 50%;
      transform: translateY(-50%);
    }

    .menu-panel {
      width: clamp(260px, 23vw, 340px);
    }

    .menu-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: clamp(14px, 1.4vw, 28px);
      padding: clamp(10px, 1.4vh, 22px) 0;
      border-bottom: 1.5px solid #ccc;
      border-radius: 6px;
      transition: transform 0.22s ease, background 0.22s ease;
      cursor: pointer;
    }

    .menu-link:first-child .menu-item {
      border-top: 1.5px solid #ccc;
    }

    .menu-link:last-child .menu-item {
      border-bottom: 1.5px solid #ccc;
    }

    .menu-item:hover {
      transform: translateX(10px);
      background: rgba(49, 158, 169, 0.06);
      padding-left: 8px;
    }

    .menu-item:hover img,
    .menu-item:hover svg {
      transform: scale(1.08);
    }

    .menu-item:hover .menu-item-label span,
    .menu-item:hover .menu-item-label strong {
      color: #319EA9;
    }

    .menu-item img {
      width: clamp(48px, 4.8vw, 72px);
      height: clamp(48px, 4.8vw, 72px);
      object-fit: contain;
      flex-shrink: 0;
      transition: transform 0.22s ease;
      display: block;
    }

    .menu-item svg {
      flex-shrink: 0;
      transition: transform 0.22s ease;
      display: block;
    }

    .menu-item-label {
      font-size: clamp(18px, 2vw, 34px);
      color: #111;
      line-height: 1.1;
      white-space: nowrap;
    }

    .menu-item-label span {
      font-weight: 300;
    }

    .menu-item-label strong {
      font-weight: 700;
    }

    /* ── FOOTER ── */
    .hero-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(40px, 5vw, 120px) clamp(18px, 3.5vh, 55px);
    }

    .service-desk {
      display: flex;
      align-items: center;
      gap: clamp(6px, 0.5vw, 12px);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .service-desk:hover { transform: scale(1.05); }

    .service-desk img {
      width: clamp(32px, 3vw, 58px);
      height: clamp(32px, 3vw, 58px);
      object-fit: contain;
    }

    .service-text {
      font-size: clamp(12px, 1vw, 20px);
      font-weight: 400;
      color: #333;
    }

    .footer-text {
      font-size: clamp(13px, 1.3vw, 26px);
      color: #888;
    }

    /* ═══════════════════════════════ MOBILE ═══════════════════════════════ */

    @media (max-width: 768px) {
      body { overflow-y: auto; height: auto; }

      .hero { display: none; }

      .mobile-layout {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        position: relative;
        background: #fff;
        overflow: hidden;
      }

      .m-bg-main {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: url('assets/Background_C.png') no-repeat center;
        background-size: cover;
        opacity: 0.18;
        pointer-events: none;
        z-index: 0;
      }

      .m-bg-lines {
        position: absolute;
        top: 0; right: 0;
        width: 130px;
        pointer-events: none;
        z-index: 0;
      }

      .m-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        flex: 1;
        padding-bottom: 36px;
      }

      .m-logos {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 24px 20px 0;
      }

      .m-logo-cbqa { height: 50px; object-fit: contain; }
      .m-logo-nexora {
        height: 36px; object-fit: contain;
        position: relative; top: 5px;
      }

      .m-hero-text {
        padding: 20px 20px 0;
        position: relative;
      }

      .m-brand-text {
        font-size: 17px; font-weight: 500; color: #111;
        margin-bottom: -6px;
      }

      .m-one-text {
        font-size: 100px; font-weight: 900;
        color: #319EA9; line-height: 0.9; margin: 0;
      }

      .m-desc-text {
        font-size: 12px; font-weight: 300; color: #777;
        line-height: 1.5; text-align: right;
        position: absolute; right: 20px; bottom: -44px;
      }

      .m-menu-panel {
        margin: 56px 16px 0;
        background: rgba(255,255,255,0.82);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 14px;
        padding: 2px 16px;
        box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      }

      .m-menu-link { text-decoration: none; color: inherit; display: block; }

      .m-menu-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 6px;
        border-bottom: 1px solid #e0e0e0;
        border-radius: 8px;
        transition: transform 0.2s ease, background 0.2s ease;
        cursor: pointer;
      }

      .m-menu-link:first-child .m-menu-item { border-top: 1px solid #e0e0e0; }
      .m-menu-link:last-child .m-menu-item { border-bottom: 1px solid #e0e0e0; }

      .m-menu-item:hover {
        transform: translateX(6px);
        background: rgba(49, 158, 169, 0.07);
      }

      .m-menu-item:hover .m-menu-label span,
      .m-menu-item:hover .m-menu-label strong { color: #319EA9; }

      .m-menu-item img {
        width: 46px; height: 46px;
        object-fit: contain; flex-shrink: 0;
      }

      .m-icon-gcr { width: 46px; height: 46px; flex-shrink: 0; }

      .m-menu-label { font-size: 18px; color: #111; line-height: 1.2; }
      .m-menu-label span { font-weight: 300; }
      .m-menu-label strong { font-weight: 700; }

      .m-service-desk {
        display: flex; align-items: center;
        gap: 8px; justify-content: center;
        margin-top: 28px;
        text-decoration: none; cursor: pointer;
        transition: transform 0.2s ease;
      }

      .m-service-desk:hover { transform: scale(1.04); }

      .m-service-desk img { width: 40px; height: 40px; object-fit: contain; }

      .m-service-text { font-size: 14px; font-weight: 400; color: #444; }

      .m-footer-text {
        font-size: 12px; color: #bbb;
        text-align: center; margin-top: 10px;
      }
    }
  </style>
</head>
