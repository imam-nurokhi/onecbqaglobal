<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBQA Global one</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    .mobile-layout { display: none; }

    /* ═══════════════════════════════ DESKTOP ═══════════════════════════════ */

    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    /* Background circle — left-center, large & prominent */
    .bg-main {
      position: absolute;
      inset: 0;
      background: url('assets/Background_C.png') no-repeat 24% 52%;
      background-size: 64vw;
      opacity: 0.65;
      pointer-events: none;
      z-index: 0;
    }

    /* garis_koneksi — very large, covers top-center-to-right area */
    .bg-lines {
      position: absolute;
      top: -4%;
      right: -2%;
      width: clamp(340px, 50vw, 780px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.9;
    }

    .hero > *:not(.bg-main):not(.bg-lines) {
      position: relative;
      z-index: 1;
    }

    /* ── TOP LOGOS ── */
    .top-logos {
      display: flex;
      align-items: center;
      gap: clamp(8px, 0.8vw, 16px);
      padding: clamp(18px, 3vh, 44px) 0 0 clamp(40px, 4vw, 72px);
    }

    .logo-cbqa {
      height: clamp(52px, 7.5vh, 90px);
      object-fit: contain;
    }

    .logo-nexora {
      height: clamp(36px, 5vh, 62px);
      object-fit: contain;
      position: relative;
      top: clamp(4px, 0.7vh, 10px);
    }

    /* ── HERO BODY ── */
    .hero-body {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
    }

    /* Left: CBQA Global + ONE + desc */
    .hero-left {
      position: absolute;
      left: clamp(120px, 16vw, 260px);
      top: 50%;
      transform: translateY(-52%);
    }

    .brand-text {
      font-size: clamp(18px, 2.2vw, 42px);
      font-weight: 500;
      color: #111;
      line-height: 1;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .one-text {
      font-size: clamp(140px, 22vw, 310px);
      font-weight: 900;
      color: #319EA9;
      line-height: 0.82;
      white-space: nowrap;
      letter-spacing: -0.05em;
    }

    .desc-text {
      margin-top: clamp(6px, 1vh, 16px);
      margin-left: clamp(90px, 9.5vw, 180px);
      font-size: clamp(10px, 0.85vw, 15px);
      font-weight: 300;
      color: #555;
      line-height: 1.6;
    }

    /* Right: Service menu — pushed to the right edge */
    .hero-right {
      position: absolute;
      right: clamp(36px, 4.5vw, 80px);
      top: 50%;
      transform: translateY(-50%);
    }

    .menu-panel {
      width: clamp(300px, 28vw, 420px);
    }

    .menu-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: clamp(12px, 1.2vw, 24px);
      padding: clamp(9px, 1.3vh, 20px) 0;
      border-bottom: 1.5px solid #ccc;
      transition: transform 0.22s ease, background 0.22s ease;
      cursor: pointer;
    }

    .menu-link:first-child .menu-item {
      border-top: 1.5px solid #ccc;
    }

    .menu-item:hover {
      transform: translateX(10px);
      background: rgba(49, 158, 169, 0.06);
      padding-left: 8px;
    }

    .menu-item:hover img,
    .menu-item:hover svg {
      transform: scale(1.08);
    }

    .menu-item:hover .menu-item-label span,
    .menu-item:hover .menu-item-label strong {
      color: #319EA9;
    }

    .menu-item img {
      width: clamp(52px, 5.5vw, 78px);
      height: clamp(52px, 5.5vw, 78px);
      object-fit: contain;
      flex-shrink: 0;
      transition: transform 0.22s ease;
      display: block;
    }

    .menu-item svg {
      flex-shrink: 0;
      transition: transform 0.22s ease;
      display: block;
    }

    .menu-item-label {
      font-size: clamp(20px, 2.4vw, 46px);
      color: #111;
      line-height: 1.1;
      white-space: nowrap;
    }

    .menu-item-label span { font-weight: 300; }
    .menu-item-label strong { font-weight: 700; }

    /* ── FOOTER ── */
    .hero-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(36px, 4.5vw, 80px) clamp(16px, 3vh, 48px);
    }

    .service-desk {
      display: flex;
      align-items: center;
      gap: clamp(6px, 0.5vw, 10px);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .service-desk:hover { transform: scale(1.05); }

    .service-desk img {
      width: clamp(28px, 2.8vw, 52px);
      height: clamp(28px, 2.8vw, 52px);
      object-fit: contain;
    }

    .service-text {
      font-size: clamp(11px, 0.9vw, 18px);
      font-weight: 400;
      color: #333;
    }

    .footer-text {
      font-size: clamp(11px, 1.1vw, 22px);
      color: #888;
    }

    /* ═══════════════════════════════ MOBILE ═══════════════════════════════ */

    @media (max-width: 768px) {
      body { overflow-y: auto; height: auto; }

      .hero { display: none; }

      .mobile-layout {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background: #fff;
      }

      /* ── HERO IMAGE BLOCK (top ~42%) ── */
      .m-hero-image {
        position: relative;
        width: 100%;
        height: 42vmax;
        min-height: 200px;
        max-height: 320px;
        background: url('assets/Background_C.png') no-repeat center center;
        background-size: cover;
        flex-shrink: 0;
      }

      .m-geo-lines {
        position: absolute;
        top: 0; right: 0;
        width: 65%;
        pointer-events: none;
        z-index: 1;
      }

      .m-logos {
        position: absolute;
        top: 18px; left: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 2;
      }

      .m-logo-cbqa {
        height: 42px;
        object-fit: contain;
        filter: drop-shadow(0 1px 4px rgba(0,0,0,0.3));
      }

      .m-logo-nexora {
        height: 30px;
        object-fit: contain;
        position: relative; top: 4px;
        filter: drop-shadow(0 1px 4px rgba(0,0,0,0.3));
      }

      /* ── BRAND SECTION ── */
      .m-brand-section {
        padding: 20px 20px 0;
        position: relative;
      }

      .m-brand-text {
        font-size: 18px;
        font-weight: 500;
        color: #111;
        line-height: 1;
        margin-bottom: -4px;
      }

      .m-one-row {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
      }

      .m-one-text {
        font-size: clamp(90px, 22vw, 140px);
        font-weight: 900;
        color: #319EA9;
        line-height: 0.82;
        letter-spacing: -0.04em;
      }

      .m-desc-text {
        font-size: 11px;
        font-weight: 300;
        color: #666;
        line-height: 1.55;
        text-align: right;
        padding-bottom: 6px;
        max-width: 130px;
      }

      /* ── MENU PANEL ── */
      .m-menu-panel {
        margin: 22px 0 0;
        padding: 0 20px;
      }

      .m-menu-link { text-decoration: none; color: inherit; display: block; }

      .m-menu-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 0;
        border-bottom: 1px solid #ccc;
        transition: transform 0.2s ease, background 0.2s ease;
        cursor: pointer;
      }

      .m-menu-link:first-child .m-menu-item {
        border-top: 1px solid #ccc;
      }

      .m-menu-item:hover {
        transform: translateX(6px);
        background: rgba(49, 158, 169, 0.07);
        padding-left: 6px;
      }

      .m-menu-item:hover .m-menu-label span,
      .m-menu-item:hover .m-menu-label strong { color: #319EA9; }

      .m-menu-item img {
        width: 52px; height: 52px;
        object-fit: contain; flex-shrink: 0;
      }

      .m-icon-grc { width: 52px; height: 52px; flex-shrink: 0; }

      .m-menu-label { font-size: 22px; color: #111; line-height: 1.2; }
      .m-menu-label span { font-weight: 300; }
      .m-menu-label strong { font-weight: 700; }

      /* ── SERVICE DESK ── */
      .m-service-desk {
        display: flex; align-items: center;
        gap: 8px; justify-content: center;
        margin: 28px 0 8px;
        text-decoration: none; cursor: pointer;
        transition: transform 0.2s ease;
      }

      .m-service-desk:hover { transform: scale(1.04); }
      .m-service-desk img { width: 38px; height: 38px; object-fit: contain; }
      .m-service-text { font-size: 14px; font-weight: 400; color: #444; }

      .m-footer-text {
        font-size: 12px; color: #bbb;
        text-align: center; margin-bottom: 18px;
      }
    }
  </style>
</head>
<body>
